#
name: COBOL Check Automation

on:
  push:
    branches: [ main ]

jobs:

  #1. SETUP JAVA AND ZOWE CLI
  Setup-java-and-zowe:
    runs-on:  ubuntu-latest

    steps:
      - name: set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin' # Add this 
      - name: Show Java version
        run: java -version

      # 1. Ensure Node.js is installed
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 2. Install Zowe CLI globally
      - name: Install Zowe CLI
        run: sudo npm install -g @zowe/cli@latest

      - name: Locate Zowe in Git root
        run: sudo npm list -g @zowe/cli

      - name: Add npm bin to PATH
        run: echo "$(npm config get prefix)/bin" >> $GITHUB_PATH
              npm root -g
         

      - name: Run Zowe Command
        run: |
           zowe zos-files list data-set "z84549.unemp.*" \
            --host ${{ secrets.ZOWE_HOST }} \
            --port ${{ secrets.ZOWE_PORT }} \
            --user ${{ secrets.ZOWE_USERNAME }} \
            --pass ${{ secrets.ZOWE_PASSWORD }} \
            --reject-unauthorized false

      #- name: Create .zowe directory and config file
      #  run: |
      #    zowe config init --global-config
      #    # Configure connection using secrets
      #    zowe config set "zosmf.host" "${{ secrets.ZOSMF_HOST }}" --global-config
      #    zowe config set "zosmf.port" "${{ secrets.ZOSMF_PORT }}" --global-config
      #    zowe config set "zosmf.user" "${{ secrets.ZOSMF_USERNAME }}" --global-config
      #    zowe config set "zosmf.password" "${{ secrets.ZOSMF_PASSWORD }}" --global-config


  #2 Main Job - COBOL Check      
  cobol-check:
    if: false
    runs-on: ubuntu-latest
    needs: Setup-java-and-zowe

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with: 
          submodules: true
          lfs: true

      - name: Run Zowe Script
        env:
          ZOWE_HOST: ${{ secrets.ZOWE_HOST }}
          ZOWE_PORT: ${{ secrets.ZOWE_PORT }}
          ZOWE_USER: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASS: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          echo "$(npm config get prefix)/bin" >> $GITHUB_PATH
          export PATH=$(npm bin):$PATH
          chmod u+x ./.github/scripts/zowe_operations.sh
          bash ./.github/scripts/zowe_operations.sh
          
      - name: Set up Mainframe Environment and upload COBOL Check
        env:
         # ZOWE_HOST: ${{ secrets.ZOWE_HOST }}
         # ZOWE_PORT: ${{ secrets.ZOWE_PORT }}
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
              chmod u+x ./.github/scripts/zowe_operations.sh
              ./.github/scripts/zowe_operations.sh
      - name: Run COBOL Check on Mainframe
        env:
         # ZOWE_HOST: ${{ secrets.ZOWE_HOST }}
         # ZOWE_PORT: ${{ secrets.ZOWE_PORT }}
        
          ZOWE_CONFIG_PATH: ${{ github.workspace }}/zowe.config.json 
          ZOWE_USERNAME: ${{ secrets.ZOWE_USERNAME }}
          ZOWE_PASSWORD: ${{ secrets.ZOWE_PASSWORD }}
        run: |
          chmod u+x .github/scripts/mainframe_operations.sh
          .github/scripts/mainframe_operations.sh



     


          
