#
name: COBOL Check Automation

on:
  push:
    branches: [ main ]

jobs:

  #1. SETUP JAVA AND ZOWE CLI
  Setup-java-and-zowe:
    runs-on:  ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with: 
            submodules: true
            lfs: true 
            
      - name: set up Java
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin' # Add this 
      - name: Show Java version
        run: java -version

      # 1. Ensure Node.js is installed
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      # 2. Install Zowe CLI globally
      - name: Install Zowe CLI
        run: sudo npm install -g @zowe/cli@latest
     #        sudo zowe config init --global-config 

      - name: Locate Zowe in Git root
        run: sudo npm list -g @zowe/cli

      - name: Add npm bin to PATH
        run: echo "$(npm config get prefix)/bin" >> $GITHUB_PATH
              npm root -g
              
      - name: Find Zowe path
        id: set-path
        run: echo "zowe_path=$(which zowe)" >> $GITHUB_OUTPUT

      - name: Use Zowe path
        run: echo "The Zowe path is ${{ steps.set-path.outputs.zowe_path }}"

      - name: Install dos2unix
        run: sudo apt-get install -y dos2unix
    
  
